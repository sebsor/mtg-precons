<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#110e07" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Precons" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>MTG Commander Precons</title>
  <style>
    :root {
      --bg:        #f0ece8;
      --surface:   #faf8f6;
      --card-bg:   #ffffff;
      --border:    #e0d8d2;
      --text:      #2e2a26;
      --text-dim:  #8a8078;
      --accent:    #5a6e8c;
      --pip-size:  20px;
      --radius:    16px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);

      /* Rotating pastel palette */
      --pastel-0: #f4e7e2;
      --pastel-1: #cee3e0;
      --pastel-2: #c3ccf8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow-x: hidden;
    }

    /* ── PAGE SYSTEM ─────────────────────────────────────────────── */
    .page { display: none; flex-direction: column; min-height: 100dvh; }
    .page.active { display: flex; }
    #page-browse.active {
      height: 100dvh;
      min-height: unset;
      overflow: hidden;
    }

    /* ── SHARED HEADER ───────────────────────────────────────────── */
    .app-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; gap: 10px;
    }
    .app-header h1 {
      flex: 1;
      font-size: 0.9rem; font-weight: 600;
      letter-spacing: 0.04em; text-transform: uppercase;
      color: var(--text);
    }
    .back-btn {
      background: none; border: 1px solid var(--border);
      color: var(--text-dim); border-radius: 20px;
      padding: 5px 12px; font-size: 0.78rem;
      cursor: pointer; font-family: inherit;
    }
    .back-btn:active { opacity: 0.6; }

    /* ── MANA SYMBOL ICONS ───────────────────────────────────────── */
    .pip-btn {
      width: 32px; height: 32px; border-radius: 50%;
      border: 2.5px solid transparent;
      cursor: pointer; padding: 0;
      display: inline-flex; align-items: center; justify-content: center;
      transition: transform 0.1s, border-color 0.15s, box-shadow 0.15s;
      user-select: none; flex-shrink: 0;
      background: none;
    }
    .pip-btn:active { transform: scale(0.88); }
    .pip-btn.active { border-color: var(--text); box-shadow: 0 0 0 2px rgba(0,0,0,0.1); }
    .pip-btn img { width: 26px; height: 26px; display: block; border-radius: 50%; }

    .pip {
      width: var(--pip-size); height: var(--pip-size);
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .pip img { width: 100%; height: 100%; display: block; }

    .mini-spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─────────────────────────────────────────────────────────────
       BROWSE PAGE
    ───────────────────────────────────────────────────────────── */
    #page-browse { }
    .browse-toolbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
      position: sticky; top: 0; z-index: 100;
      display: flex; flex-direction: column; gap: 8px;
    }
    .browse-toolbar-row {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    #browse-search {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: 20px; color: var(--text); font-size: 0.84rem;
      padding: 7px 14px; outline: none; font-family: inherit;
    }
    #browse-search::placeholder { color: var(--text-dim); }
    #browse-search:focus { border-color: var(--accent); }
    #sort-select, #start-set {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 20px; color: var(--text); font-size: 0.75rem;
      padding: 6px 10px; outline: none; cursor: pointer;
      -webkit-appearance: none; flex-shrink: 0;
    }
    .deck-count-badge {
      font-size: 0.68rem; color: var(--text-dim);
      font-family: monospace; background: var(--bg);
      padding: 3px 10px; border-radius: 20px;
      border: 1px solid var(--border); flex-shrink: 0;
    }

    /* grid */
    .browse-main { padding: 12px; flex: 1; }
    .set-group { margin-bottom: 24px; }
    .set-header {
      display: flex; align-items: baseline; gap: 8px;
      margin-bottom: 10px; padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .set-name { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); font-weight: 600; }
    .set-year { font-size: 0.65rem; color: var(--text-dim); font-family: monospace; }
    .set-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 10px; }

    /* deck card — pastel color assigned via inline style on .deck-card */
    .deck-card {
      border-radius: var(--radius); overflow: hidden;
      display: flex; flex-direction: column;
      cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .deck-card:active { transform: scale(0.97); box-shadow: 0 1px 2px rgba(0,0,0,0.05); }

    .card-art-wrap {
      width: 100%; aspect-ratio: 16/9; overflow: hidden;
      position: relative;
    }
    .card-art-wrap img {
      width: 100%; height: 100%; object-fit: cover; object-position: top center;
      display: block; transition: opacity 0.3s;
    }
    .card-art-wrap img.loading { opacity: 0; }
    .art-placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: rgba(0,0,0,0.15); font-size: 1.6rem;
    }

    .card-body { padding: 9px 11px 4px; flex: 1; display: flex; flex-direction: column; gap: 3px; }
    .card-deck-name { font-size: 0.82rem; color: var(--text); line-height: 1.25; font-weight: 600; }
    .card-cmd { font-size: 0.68rem; color: var(--text-dim); line-height: 1.3; }
    .card-footer {
      display: flex; align-items: center;
      padding: 5px 11px 10px;
    }
    .color-pips { display: flex; gap: 3px; }

    /* empty/error */
    .status-msg {
      text-align: center; padding: 50px 20px;
      color: var(--text-dim); font-size: 0.85rem;
    }
    .status-msg .icon { font-size: 2rem; margin-bottom: 10px; }

    /* ─────────────────────────────────────────────────────────────
       DETAIL PAGE
    ───────────────────────────────────────────────────────────── */

    .detail-credit-bar {
      font-size: 0.62rem;
      color: var(--text-dim);
      font-family: sans-serif;
      text-align: center;
      padding: 4px 12px;
      flex-shrink: 0;
      background: var(--bg);
      min-height: 18px;
    }

    #page-detail { }
    .detail-hero {
      position: relative;
      width: 100%;
      flex-shrink: 0;
      background: #e8e4e0;
      overflow: hidden;
    }
    .detail-hero img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: top center;
      display: block;
      transition: opacity 0.2s;
    }
    .detail-hero.card-mode img {
      object-fit: contain;
      object-position: center;
    }
    .detail-hero img.loading { opacity: 0; }
    .detail-columns {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .detail-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px 24px;
    }
    .detail-preview-panel { }

    @media (max-width: 899px) {
      #page-detail.active {
        height: 100dvh;
        min-height: unset;
        overflow: hidden;
      }
      .detail-hero {
        height: 40dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
      }
      .detail-credit-bar { flex-shrink: 0; }
      .detail-hero-overlay { display: none; }
    }

    @media (min-width: 900px) {
      .detail-hero { aspect-ratio: 16/7; }
      .detail-hero-overlay {
        position: absolute; inset: 0;
        background: linear-gradient(to bottom, transparent 30%, var(--bg) 100%);
      }
      .detail-preview-panel { height: auto; align-self: stretch; }
      .detail-body { max-width: none; margin: 0; }
    }

    .detail-title {
      font-size: 1.3rem; color: var(--text); font-weight: 700;
      margin-bottom: 2px; line-height: 1.2;
    }
    .detail-set { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 10px; }
    .detail-colors { display: flex; gap: 5px; margin-bottom: 16px; }

    .detail-commanders { margin-bottom: 18px; }
    .detail-commanders h3 {
      font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-dim); margin-bottom: 7px; font-weight: 600;
    }
    .commander-entry {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 12px;
      margin-bottom: 6px; transition: background 0.15s;
    }
    .commander-entry:hover { background: var(--bg); }
    .commander-entry:active { opacity: 0.7; }
    .commander-label {
      font-size: 0.6rem; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.05em;
      width: 50px; flex-shrink: 0;
    }
    .commander-name { font-size: 0.88rem; color: var(--text); font-weight: 500; }

    /* card list */
    .detail-list h3 {
      font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-dim); margin-bottom: 10px; font-weight: 600;
    }

    /* Type filter chips */
    .type-chips {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-bottom: 14px;
    }
    .type-chip {
      padding: 5px 12px; border-radius: 20px;
      font-size: 0.72rem; font-weight: 600;
      border: none; cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      font-family: inherit;
      display: flex; align-items: center; gap: 5px;
      color: var(--text);
    }
    .type-chip:active { transform: scale(0.95); }
    .type-chip.dimmed { opacity: 0.35; }

    .type-group { margin-bottom: 18px; }
    .type-group-label {
      font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-dim); font-weight: 600; margin-bottom: 5px; padding: 0 2px;
    }
    .card-row {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 0; border-bottom: 1px solid var(--border);
    }
    .card-row:last-child { border-bottom: none; }
    .card-row-count {
      font-size: 0.7rem; color: var(--text-dim);
      font-family: monospace; width: 16px; text-align: right; flex-shrink: 0;
    }
    .card-row-name { font-size: 0.82rem; color: var(--text); }
    .card-row-foil { font-size: 0.6rem; color: var(--accent); margin-left: auto; flex-shrink: 0; }
    .card-row.tapped { background: var(--bg); border-radius: 6px; }

    .detail-loading {
      text-align: center; padding: 24px;
      color: var(--text-dim); font-size: 0.8rem;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }

    /* ── BROWSE LOADING OVERLAY ──────────────────────────────────── */
    .browse-loading-overlay {
      position: absolute; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 50; padding: 40px 24px;
    }
    .browse-loading-overlay.hidden { display: none; }
    .first-load-msg { text-align: center; max-width: 280px; }
    .first-load-title { font-size: 0.95rem; color: var(--text); margin-bottom: 8px; font-weight: 500; }
    .first-load-sub { font-size: 0.75rem; color: var(--accent); font-family: monospace; margin-bottom: 16px; min-height: 1.2em; }
    .first-load-note {
      font-size: 0.7rem; color: var(--text-dim); line-height: 1.5;
      border-top: 1px solid var(--border); padding-top: 14px;
    }

    /* ── BROWSE BODY ─────────────────────────────────────────────── */
    .browse-body { display: flex; flex: 1; overflow: hidden; position: relative; }
    .browse-main { flex: 1; overflow-y: auto; padding: 12px; }

    /* ── CARD PREVIEW PANEL ──────────────────────────────────────── */
    .card-preview-panel { display: none; }

    @media (min-width: 900px) {
      .card-preview-panel {
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        width: 260px; flex-shrink: 0;
        height: 100%;
        padding: 16px 12px;
        border-left: 1px solid var(--border);
        background: var(--surface);
      }
      .preview-empty {
        text-align: center; color: var(--text-dim); font-size: 0.78rem;
        line-height: 1.6; border: 1px dashed var(--border);
        border-radius: var(--radius); padding: 20px; width: 100%;
      }
      .preview-content {
        display: flex; flex-direction: column;
        align-items: center; gap: 8px; width: 100%;
      }
      #preview-img, #detail-preview-img {
        width: 100%; max-width: 224px;
        border-radius: 10px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        transition: opacity 0.2s; display: block;
      }
      #preview-img.loading, #detail-preview-img.loading { opacity: 0; }
      .preview-credit {
        font-size: 0.6rem; color: var(--text-dim);
        text-align: center; font-family: sans-serif;
      }
    }

    /* responsive */
    @media (min-width: 600px) {
      .set-cards { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
    }
    @media (max-width: 360px) {
      .set-cards { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════════
     BROWSE PAGE
══════════════════════════════════════════════════════════════ -->
<div id="page-browse" class="page active">
  <div class="browse-toolbar">
    <div class="browse-toolbar-row">
      <input id="browse-search" type="search" placeholder="Search…" autocomplete="off" />
      <select id="sort-select">
        <option value="date-desc">New</option>
        <option value="date-asc">Old</option>
        <option value="name">A–Z</option>
      </select>
      <span class="deck-count-badge" id="deck-count">—</span>
    </div>
    <div class="browse-toolbar-row">
      <div id="browse-color-row" style="display:flex;gap:5px">
        <button class="pip-btn" data-c="W" title="White"><img src="https://svgs.scryfall.io/card-symbols/W.svg" alt="W"></button>
        <button class="pip-btn" data-c="U" title="Blue"><img src="https://svgs.scryfall.io/card-symbols/U.svg" alt="U"></button>
        <button class="pip-btn" data-c="B" title="Black"><img src="https://svgs.scryfall.io/card-symbols/B.svg" alt="B"></button>
        <button class="pip-btn" data-c="R" title="Red"><img src="https://svgs.scryfall.io/card-symbols/R.svg" alt="R"></button>
        <button class="pip-btn" data-c="G" title="Green"><img src="https://svgs.scryfall.io/card-symbols/G.svg" alt="G"></button>
        <button class="pip-btn" data-c="C" title="Colorless"><img src="https://svgs.scryfall.io/card-symbols/C.svg" alt="C"></button>
      </div>
      <select id="start-set">
        <option value="">All sets</option>
      </select>
    </div>
  </div>
  <!-- First-load overlay: shown while fetching, hidden once ready -->
  <div id="browse-loading-overlay" class="browse-loading-overlay">
    <div class="first-load-msg">
      <div class="mini-spinner" style="width:24px;height:24px;border-width:3px;margin:0 auto 16px"></div>
      <p class="first-load-title">Fetching decks for the first time…</p>
      <p class="first-load-sub" id="load-status-text">Loading…</p>
      <p class="first-load-note">This only happens once. Future visits load instantly.</p>
    </div>
  </div>
  <div class="browse-body">
    <div class="browse-main" id="browse-main"></div>
    <!-- Desktop card preview panel -->
    <div class="card-preview-panel" id="card-preview-panel">
      <div class="preview-empty" id="preview-empty">
        <span>Hover a deck<br>to preview</span>
      </div>
      <div class="preview-content" id="preview-content" style="display:none">
        <img id="preview-img" src="" alt="" />
        <div class="preview-credit" id="preview-credit"></div>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════
     DETAIL PAGE
══════════════════════════════════════════════════════════════ -->
<div id="page-detail" class="page">
  <div class="app-header">
    <button class="back-btn" id="detail-back">← Decks</button>
    <h1 id="detail-header-title">Deck</h1>
  </div>
  <div class="detail-hero" id="detail-hero">
    <div class="art-placeholder">⚔</div>
  </div>
  <div class="detail-credit-bar" id="detail-credit-bar"></div>
  <div class="detail-columns">
    <div class="detail-body" id="detail-body">
      <div class="detail-loading"><div class="spinner"></div><span>Loading deck list…</span></div>
    </div>
    <!-- Desktop card preview panel for decklist -->
    <div class="card-preview-panel detail-preview-panel" id="detail-preview-panel">
      <div class="preview-empty" id="detail-preview-empty">
        <span>Hover a card<br>to preview</span>
      </div>
      <div class="preview-content" id="detail-preview-content" style="display:none">
        <img id="detail-preview-img" src="" alt="" />
        <div class="preview-credit" id="detail-preview-credit"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
//  CONSTANTS
// ════════════════════════════════════════════════════════════════
const DECKS_URL = 'https://raw.githubusercontent.com/taw/magic-preconstructed-decks-data/master/decks_v2.json';
const SF_COLL   = 'https://api.scryfall.com/cards/collection';
const DELAY     = 120; // ms between batch requests — well within Scryfall's 10 req/s

const TYPE_ORDER = ['Creature','Planeswalker','Instant','Sorcery','Artifact','Enchantment','Battle','Land','Other'];
const PASTELS    = ['#f4e7e2', '#cee3e0', '#c3ccf8'];
const CACHE_KEY  = 'mtg_precons_v5';
const CACHE_TTL  = 24 * 60 * 60 * 1000; // 24 hours in ms
const COLOR_ORDER = ['W','U','B','R','G'];

// ════════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════════
let allDecks = [];        // [{name, setName, releaseDate, face, second, rawCards, colors, art, artist, copyright}]
let sfCache  = {};        // cardName -> {colors, art, artist, copyright}
let detailCardCache = {}; // deckName -> [{name, type_line, count, foil}...]

let activeColors = new Set();
let sortMode     = 'date-desc';
let searchTerm   = '';
let activeSet    = '';
let browseScrollY = 0;
let dataReady    = false;

// ════════════════════════════════════════════════════════════════
//  UTILITIES
// ════════════════════════════════════════════════════════════════
const sleep = ms => new Promise(r => setTimeout(r, ms));
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function colorName(c) { return {W:'White',U:'Blue',B:'Black',R:'Red',G:'Green',C:'Colorless'}[c]||c; }
function pipHtml(colors) {
  return colors.map(c =>
    `<span class="pip" title="${colorName(c)}"><img src="https://svgs.scryfall.io/card-symbols/${c}.svg" alt="${c}"></span>`
  ).join('');
}
function getYear(d) { return (d||'').slice(0,4); }

function classifyType(type_line) {
  if (!type_line) return 'Other';
  for (const t of TYPE_ORDER) {
    if (t === 'Other') continue;
    if (type_line.includes(t)) return t;
  }
  return 'Other';
}

// ════════════════════════════════════════════════════════════════
//  PAGE NAVIGATION
// ════════════════════════════════════════════════════════════════
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id !== 'page-browse') window.scrollTo(0,0);
}

// ════════════════════════════════════════════════════════════════
//  DATA LOADING
// ════════════════════════════════════════════════════════════════
function getCommanderNames(deck) {
  const cmds = deck.commander || [];
  const disp = deck.displayCommander || [];
  if (cmds.length >= 2) return { face: cmds[0].name, second: cmds[1].name };
  if (cmds.length === 1) {
    const dispOther = disp.map(c=>c.name).filter(n=>n!==cmds[0].name);
    return { face: cmds[0].name, second: dispOther.length===1 ? dispOther[0] : null };
  }
  return { face: null, second: null };
}

async function fetchCommandersBatch(names) {
  // Split into batches of 75 (Scryfall collection limit)
  const nameArr = [...names];
  const batches = [];
  for (let i = 0; i < nameArr.length; i += 75) batches.push(nameArr.slice(i, i+75));

  let batchDone = 0;
  for (const batch of batches) {
    try {
      setLoadStatus(`Fetching commander data (batch ${++batchDone}/${batches.length})…`);
      await sleep(DELAY);
      const res = await fetch(SF_COLL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ identifiers: batch.map(name => ({ name })) })
      });
      if (!res.ok) continue;
      const data = await res.json();
      (data.data || []).forEach(card => {
        sfCache[card.name] = extractCardMeta(card);
      });
      // Mark not-found as null so we don't retry them
      (data.not_found || []).forEach(nf => {
        if (nf.name) sfCache[nf.name] = null;
      });
    } catch { /* skip batch, will result in null entries */ }
  }

  // Apply results to all decks
  allDecks.forEach(d => setColors(d));
}

function extractCardMeta(card) {
  const colors = card.color_identity || [];
  let art = null, cardImg = null, artist = null;
  if (card.card_faces && card.card_faces[0]?.image_uris) {
    art     = card.card_faces[0].image_uris.art_crop;
    cardImg = card.card_faces[0].image_uris.normal;
  } else if (card.image_uris) {
    art     = card.image_uris.art_crop;
    cardImg = card.image_uris.normal;
  }
  artist = card.artist || null;
  return { colors, art, cardImg, artist };
}

function setColors(deck) {
  const f = deck.face ? sfCache[deck.face] : null;
  const s = deck.second ? sfCache[deck.second] : null;
  const set = new Set();
  (f?.colors||[]).forEach(c=>set.add(c));
  (s?.colors||[]).forEach(c=>set.add(c));
  deck.colors  = set.size===0 ? ['C'] : COLOR_ORDER.filter(c=>set.has(c));
  deck.art     = f?.art     || null;
  deck.cardImg = f?.cardImg || null;
  deck.artist  = f?.artist  || null;
}

// ── Cache helpers ──────────────────────────────────────────────
function saveCache(decks) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), decks }));
  } catch(e) {
    // localStorage can be full or blocked — silently ignore
    console.warn('Cache write failed:', e.message);
  }
}

function loadCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const { ts, decks } = JSON.parse(raw);
    if (Date.now() - ts > CACHE_TTL) return null; // stale
    return { decks, ts };
  } catch {
    return null;
  }
}

function cacheAge(ts) {
  const mins = Math.round((Date.now() - ts) / 60000);
  if (mins < 2)  return 'just now';
  if (mins < 60) return `${mins}m ago`;
  return `${Math.round(mins/60)}h ago`;
}

// ── Main load ─────────────────────────────────────────────────
async function loadDecks() {
  // 1. Try cache first — hide overlay immediately, render at once
  const cached = loadCache();
  if (cached) {
    allDecks = cached.decks;
    populateSetDropdown();
    dataReady = true;
    hideBrowseOverlay();
    renderBrowse();
    return;
  }

  // 2. No valid cache — show overlay with progress while fetching
  setLoadStatus('Fetching deck list…');
  try {
    const res = await fetch(DECKS_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const raw = await res.json();

    const filtered = raw.filter(d =>
      d.type === 'Commander Deck' &&
      !d.name.includes('Collector') &&
      !(d.set_name||'').includes('MTGO')
    );

    filtered.sort((a,b) => (b.release_date||'').localeCompare(a.release_date||''));

    allDecks = filtered.map(d => {
      const {face, second} = getCommanderNames(d);
      return {
        name: d.name,
        setName: d.set_name || '',
        releaseDate: d.release_date || '',
        face, second,
        rawCards: [...(d.cards||[]), ...(d.commander||[])],
        colors: [], art: null, artist: null, cardImg: null,
      };
    });

    populateSetDropdown();
    setLoadStatus('Fetching commander data…');

    const names = new Set();
    allDecks.forEach(d => { if(d.face) names.add(d.face); if(d.second) names.add(d.second); });

    await fetchCommandersBatch(names);

    saveCache(allDecks);
    dataReady = true;
    hideBrowseOverlay();
    renderBrowse();

  } catch(e) {
    setLoadStatus('Failed to load: ' + e.message);
  }
}

function setLoadStatus(text) {
  const $el = document.getElementById('load-status-text');
  if ($el) $el.textContent = text;
}

function hideBrowseOverlay() {
  const $overlay = document.getElementById('browse-loading-overlay');
  if ($overlay) $overlay.classList.add('hidden');
}

function populateSetDropdown() {
  const sets = [...new Set(allDecks.map(d=>d.setName))].filter(Boolean);
  // Sets already sorted newest-first from allDecks
  const sel = document.getElementById('start-set');
  sets.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    sel.appendChild(opt);
  });
}

// ════════════════════════════════════════════════════════════════
//  FILTERING & SORTING
// ════════════════════════════════════════════════════════════════
function getFiltered() {
  let decks = [...allDecks];
  if (searchTerm) {
    const q = searchTerm.toLowerCase();
    decks = decks.filter(d =>
      d.name.toLowerCase().includes(q) ||
      d.setName.toLowerCase().includes(q) ||
      (d.face&&d.face.toLowerCase().includes(q)) ||
      (d.second&&d.second.toLowerCase().includes(q))
    );
  }
  if (activeColors.size > 0) {
    decks = decks.filter(d => [...activeColors].every(c=>d.colors.includes(c)));
  }
  if (activeSet) {
    decks = decks.filter(d => d.setName === activeSet);
  }
  if (sortMode==='date-desc') decks.sort((a,b)=>b.releaseDate.localeCompare(a.releaseDate));
  else if (sortMode==='date-asc') decks.sort((a,b)=>a.releaseDate.localeCompare(b.releaseDate));
  else decks.sort((a,b)=>a.name.localeCompare(b.name));
  return decks;
}

// ════════════════════════════════════════════════════════════════
//  BROWSE RENDER
// ════════════════════════════════════════════════════════════════
function renderBrowse() {
  const decks = getFiltered();
  const $main = document.getElementById('browse-main');
  const $count = document.getElementById('deck-count');
  $count.textContent = decks.length;

  if (!decks.length) {
    $main.innerHTML = '<div class="status-msg"><div class="icon">🔍</div><p>No decks match.</p></div>';
    return;
  }

  if (sortMode === 'name') {
    $main.innerHTML = `<div class="set-cards">${decks.map((d,i) => cardHtml(d,i)).join('')}</div>`;
  } else {
    const groups = [], seen = new Map();
    decks.forEach(d => {
      if (!seen.has(d.setName)) { seen.set(d.setName,[]); groups.push(d.setName); }
      seen.get(d.setName).push(d);
    });
    $main.innerHTML = groups.map(sn => {
      const sd = seen.get(sn);
      return `<div class="set-group">
        <div class="set-header">
          <span class="set-name">${esc(sn)}</span>
          <span class="set-year">${getYear(sd[0].releaseDate)}</span>
        </div>
        <div class="set-cards">${sd.map((d,i) => cardHtml(d,i)).join('')}</div>
      </div>`;
    }).join('');
  }

  // Attach click + hover handlers
  $main.querySelectorAll('.deck-card').forEach(el => {
    el.addEventListener('click', () => openDetail(el.dataset.name));
    el.addEventListener('mouseenter', () => showCardPreview(el.dataset.name));
    el.addEventListener('mouseleave', () => hideCardPreview());
  });

  // Restore scroll position inside the grid container
  document.getElementById('browse-main').scrollTop = browseScrollY;
}

function cardHtml(d, idx) {
  const pips = pipHtml(d.colors);
  const artHtml = d.art
    ? `<img src="${esc(d.art)}" alt="${esc(d.face||d.name)}" loading="lazy" class="loading" onload="this.classList.remove('loading')" /><div class="art-placeholder">⚔</div>`
    : `<div class="art-placeholder">⚔</div>`;
  const cmdText = d.face
    ? (d.second ? `${esc(d.face)} &amp; ${esc(d.second)}` : esc(d.face))
    : '';

  return `<div class="deck-card" data-name="${esc(d.name)}">
    <div class="card-art-wrap">${artHtml}</div>
    <div class="card-body">
      <div class="card-deck-name">${esc(d.name)}</div>
      ${cmdText ? `<div class="card-cmd">${cmdText}</div>` : ''}
    </div>
    <div class="card-footer">
      <div class="color-pips">${pips}</div>
    </div>
  </div>`;
}

// ════════════════════════════════════════════════════════════════
//  DETAIL PAGE
// ════════════════════════════════════════════════════════════════
async function openDetail(deckName) {
  browseScrollY = document.getElementById('browse-main').scrollTop;
  const deck = allDecks.find(d => d.name === deckName);
  if (!deck) return;

  document.getElementById('detail-header-title').textContent = deck.name;

  // Default hero = art crop (atmospheric, fills space nicely)
  // Card tap = full card image (shows text box)
  const defaultImg = deck.art || deck.cardImg || null;
  const defaultMode = 'art'; // cover mode

  setDetailHeroImage(defaultImg, deck.face, deck.artist, 'art');

  // Tap hero to reset to art crop
  const $hero = document.getElementById('detail-hero');
  $hero.onclick = () => {
    setDetailHeroImage(defaultImg, deck.face, deck.artist, 'art');
    document.querySelectorAll('.card-row.tapped').forEach(r => r.classList.remove('tapped'));
  };

  const $body = document.getElementById('detail-body');
  $body.scrollTop = 0;
  $body.innerHTML = `
    <div style="margin-top:14px">
      <div class="detail-title">${esc(deck.name)}</div>
      <div class="detail-set">${esc(deck.setName)}</div>
      <div class="detail-colors">${pipHtml(deck.colors)}</div>
      <div class="detail-commanders">
        <h3>Commander</h3>
        ${deck.face ? `<div class="commander-entry" id="commander-entry-face" style="cursor:pointer">
          <span class="commander-name">${esc(deck.face)}</span>
        </div>` : ''}
      </div>
      <div class="detail-list">
        <h3>Decklist</h3>
        <div id="detail-list-inner">
          <div class="detail-loading"><div class="spinner"></div><span>Fetching cards…</span></div>
        </div>
      </div>
    </div>`;

  showPage('page-detail');

  const cards = await getDetailCards(deck);
  renderDetailList(cards, document.getElementById('detail-list-inner'), deck);

  // Wire commander entry click now that we have cardImg from the batch fetch
  const $cmdEntry = document.getElementById('commander-entry-face');
  if ($cmdEntry && deck.face) {
    const cmdCard = cards.find(c => c.name === deck.face);
    const cmdImg = cmdCard?.cardImg || deck.cardImg || null;
    $cmdEntry.addEventListener('click', () => {
      if (cmdImg) setDetailHeroImage(cmdImg, deck.face, deck.artist, 'card');
      document.querySelectorAll('.card-row.tapped').forEach(r => r.classList.remove('tapped'));
    });
  }
}

// mode: 'art' = cover/crop (commander art), 'card' = contain (full card with text)
function setDetailHeroImage(imgUrl, altText, artist, mode) {
  const $hero   = document.getElementById('detail-hero');
  const $credit = document.getElementById('detail-credit-bar');

  // Toggle cover vs contain via class
  $hero.classList.toggle('card-mode', mode === 'card');

  if (!imgUrl) {
    let $ph = $hero.querySelector('.art-placeholder');
    if (!$ph) {
      $hero.innerHTML = '';
      $ph = document.createElement('div');
      $ph.className = 'art-placeholder';
      $ph.style.fontSize = '3rem';
      $ph.textContent = '⚔';
      $hero.appendChild($ph);
    }
    if ($credit) $credit.textContent = '';
    return;
  }

  // Reuse existing img element to avoid flicker
  let $img = $hero.querySelector('img');
  if (!$img) {
    // Clear placeholder, add img
    $hero.innerHTML = '';
    $img = document.createElement('img');
    $hero.appendChild($img);
    // Re-add overlay and hint
    const $ov = document.createElement('div');
    $ov.className = 'detail-hero-overlay';
    $hero.appendChild($ov);
  }

  if ($img.src !== imgUrl) {
    // Clear src first so the old image disappears instantly before the
    // object-fit mode switches — prevents the "shrinking" artifact
    $img.classList.add('loading');
    $img.src = '';
    // Let the class toggle take effect, then load the new image
    requestAnimationFrame(() => {
      $img.src = imgUrl;
      $img.alt = altText || '';
      $img.onload = () => $img.classList.remove('loading');
    });
  }

  // Credit bar below hero
  if ($credit) {
    if (mode === 'art' && artist) {
      $credit.textContent = `Art by ${artist} · © Wizards of the Coast`;
    } else {
      $credit.textContent = '© Wizards of the Coast';
    }
  }
}

async function getDetailCards(deck) {
  if (detailCardCache[deck.name]) return detailCardCache[deck.name];

  // Combine all cards (main + commander, deduplicated by name)
  const allNames = deck.rawCards;
  // Batch into groups of 75 for Scryfall collection endpoint
  const batches = [];
  for (let i = 0; i < allNames.length; i += 75) batches.push(allNames.slice(i, i+75));

  const typeMap = {};   // name -> type_line
  const imgMap  = {};   // name -> full card image URL

  for (const batch of batches) {
    try {
      await sleep(DELAY);
      const res = await fetch(SF_COLL, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ identifiers: batch.map(c => ({ name: c.name })) })
      });
      if (!res.ok) continue;
      const data = await res.json();
      (data.data||[]).forEach(card => {
        typeMap[card.name] = card.type_line || 'Other';
        // Full card image — prefer front face for DFCs
        if (card.card_faces && card.card_faces[0]?.image_uris) {
          imgMap[card.name] = card.card_faces[0].image_uris.normal;
        } else if (card.image_uris) {
          imgMap[card.name] = card.image_uris.normal;
        }
      });
    } catch { /* skip batch on error */ }
  }

  // Build result: merge rawCards with types + images
  const seen = new Set();
  const result = [];
  for (const c of allNames) {
    const key = c.name + '|' + c.foil;
    if (seen.has(key)) continue;
    seen.add(key);
    result.push({
      name: c.name,
      count: c.count || 1,
      foil: c.foil || false,
      typeLine: typeMap[c.name] || null,
      typeGroup: classifyType(typeMap[c.name] || ''),
      cardImg: imgMap[c.name] || null,
    });
  }

  detailCardCache[deck.name] = result;
  return result;
}

function renderDetailList(cards, $el, deck) {
  const commanderNames = new Set([deck?.face, deck?.second].filter(Boolean));
  const listCards = cards.filter(c => !commanderNames.has(c.name));

  // Build groups — only types that have cards
  const groups = {};
  TYPE_ORDER.forEach(t => groups[t] = []);
  listCards.forEach(c => (groups[c.typeGroup]||groups['Other']).push(c));
  const activeTypes = TYPE_ORDER.filter(t => groups[t].length > 0);

  // Pastel assigned per type consistently (same type always same color)
  const typeColor = {};
  activeTypes.forEach((t, i) => { typeColor[t] = PASTELS[i % PASTELS.length]; });

  let activeFilter = null; // null = show all

  function renderRows() {
    const typesToShow = activeFilter ? [activeFilter] : activeTypes;
    return typesToShow.map(t => {
      const items = groups[t];
      const rows = items.map(c =>
        `<div class="card-row" data-img="${esc(c.cardImg||'')}" data-name="${esc(c.name)}">
          <span class="card-row-count">${c.count}</span>
          <span class="card-row-name">${esc(c.name)}</span>
          ${c.foil ? '<span class="card-row-foil">✦</span>' : ''}
        </div>`
      ).join('');
      return `<div class="type-group" data-type="${esc(t)}">
        <div class="type-group-label">${t} (${items.reduce((s,c)=>s+c.count,0)})</div>
        ${rows}
      </div>`;
    }).join('');
  }

  function rebuildRows() {
    document.getElementById('detail-rows').innerHTML = renderRows();
    wireRowEvents();
    // Update chip dimmed state
    document.querySelectorAll('.type-chip').forEach(chip => {
      chip.classList.toggle('dimmed', activeFilter !== null && chip.dataset.type !== activeFilter);
    });
  }

  function wireRowEvents() {
    document.querySelectorAll('#detail-rows .card-row[data-img]').forEach(row => {
      const img  = row.dataset.img;
      const name = row.dataset.name;
      if (!img) return;
      row.addEventListener('mouseenter', () => showDetailCardPreview(img, name));
      row.addEventListener('mouseleave', () => hideDetailCardPreview());
      row.addEventListener('click', () => {
        if (window.matchMedia('(max-width: 899px)').matches) {
          setDetailHeroImage(img, name, null, 'card');
          document.querySelectorAll('.card-row.tapped').forEach(r => r.classList.remove('tapped'));
          row.classList.add('tapped');
        }
      });
    });
  }

  // Build chip bar
  const chips = activeTypes.map(t => {
    const count = groups[t].reduce((s,c)=>s+c.count,0);
    return `<button class="type-chip" data-type="${esc(t)}" style="background:${typeColor[t]}">${t} <span style="opacity:0.6;font-size:0.65rem">${count}</span></button>`;
  }).join('');

  $el.innerHTML = `
    <div class="type-chips" id="type-chips">${chips}</div>
    <div id="detail-rows">${renderRows()}</div>`;

  // Wire chip clicks
  $el.querySelectorAll('.type-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const t = chip.dataset.type;
      activeFilter = activeFilter === t ? null : t;
      rebuildRows();
    });
  });

  wireRowEvents();
}

// ════════════════════════════════════════════════════════════════
//  CARD PREVIEW (desktop hover)
// ════════════════════════════════════════════════════════════════
function showCardPreview(deckName) {
  const deck = allDecks.find(d => d.name === deckName);
  if (!deck || !deck.cardImg) return;

  const $empty   = document.getElementById('preview-empty');
  const $content = document.getElementById('preview-content');
  const $img     = document.getElementById('preview-img');
  const $credit  = document.getElementById('preview-credit');

  $empty.style.display = 'none';
  $content.style.display = 'flex';

  // Only swap image if it's a different card (avoids flicker on small mouse moves)
  if ($img.dataset.deck !== deckName) {
    $img.classList.add('loading');
    $img.src = deck.cardImg;
    $img.alt = deck.face || deck.name;
    $img.dataset.deck = deckName;
    $img.onload = () => $img.classList.remove('loading');
    $credit.textContent = deck.artist
      ? `Art by ${deck.artist} · © Wizards of the Coast`
      : '© Wizards of the Coast';
  }
}

function hideCardPreview() {
  // Small delay so hovering between adjacent cards doesn't flicker
  // We clear it immediately if a new card is entered
  hideCardPreview._timer = setTimeout(() => {
    const $empty   = document.getElementById('preview-empty');
    const $content = document.getElementById('preview-content');
    if ($empty && $content) {
      $empty.style.display = '';
      $content.style.display = 'none';
    }
  }, 120);
}

// Cancel the hide timer when entering a new card
document.addEventListener('mouseenter', e => {
  if (e.target.closest && e.target.closest('.deck-card')) {
    clearTimeout(hideCardPreview._timer);
  }
}, true);

// ── Detail page card preview ───────────────────────────────────
function showDetailCardPreview(imgUrl, cardName) {
  clearTimeout(hideDetailCardPreview._timer);
  const $empty   = document.getElementById('detail-preview-empty');
  const $content = document.getElementById('detail-preview-content');
  const $img     = document.getElementById('detail-preview-img');
  const $credit  = document.getElementById('detail-preview-credit');
  if (!$empty) return;

  $empty.style.display = 'none';
  $content.style.display = 'flex';

  if ($img.src !== imgUrl) {
    $img.classList.add('loading');
    $img.src = imgUrl;
    $img.alt = cardName;
    $img.onload = () => $img.classList.remove('loading');
    $credit.textContent = '© Wizards of the Coast';
  }
}

function hideDetailCardPreview() {
  hideDetailCardPreview._timer = setTimeout(() => {
    const $empty   = document.getElementById('detail-preview-empty');
    const $content = document.getElementById('detail-preview-content');
    if ($empty && $content) {
      $empty.style.display = '';
      $content.style.display = 'none';
    }
  }, 120);
}

document.addEventListener('mouseenter', e => {
  if (e.target.closest && e.target.closest('.card-row')) {
    clearTimeout(hideDetailCardPreview._timer);
  }
}, true);

// ════════════════════════════════════════════════════════════════
//  EVENT WIRING
// ════════════════════════════════════════════════════════════════

document.getElementById('detail-back').addEventListener('click', () => {
  showPage('page-browse');
  document.getElementById('browse-main').scrollTop = browseScrollY;
});

// Browse toolbar filters
document.getElementById('browse-search').addEventListener('input', e => {
  searchTerm = e.target.value.trim();
  browseScrollY = 0;
  renderBrowse();
});
document.getElementById('sort-select').addEventListener('change', e => {
  sortMode = e.target.value; browseScrollY = 0; renderBrowse();
});
document.getElementById('start-set').addEventListener('change', e => {
  activeSet = e.target.value; browseScrollY = 0; renderBrowse();
});
document.getElementById('browse-color-row').addEventListener('click', e => {
  const btn = e.target.closest('.pip-btn'); if (!btn) return;
  const c = btn.dataset.c;
  if (activeColors.has(c)) { activeColors.delete(c); btn.classList.remove('active'); }
  else { activeColors.add(c); btn.classList.add('active'); }
  browseScrollY = 0; renderBrowse();
});

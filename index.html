<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#110e07" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Precons" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>MTG Commander Precons</title>
  <style>
    :root {
      --bg:       #110e07;
      --surface:  #1c1710;
      --card-bg:  #1f1a0f;
      --border:   #3a2e18;
      --gold:     #c9a84c;
      --gold-dim: #7a6330;
      --text:     #e8dfc8;
      --text-dim: #8a7d60;
      --accent:   #d4a017;
      --pip-W: #f9fafb; --pip-U: #3b82f6; --pip-B: #9333ea;
      --pip-R: #ef4444; --pip-G: #16a34a; --pip-C: #9ca3af;
      --pip-size: 20px;
      --radius: 8px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', serif;
      overflow-x: hidden;
    }

    /* ── PAGE SYSTEM ─────────────────────────────────────────────── */
    .page { display: none; flex-direction: column; min-height: 100dvh; }
    .page.active { display: flex; }
    /* Browse page must be exactly viewport height so only the grid scrolls,
       not the whole page — this keeps the preview panel fixed in view */
    #page-browse.active {
      height: 100dvh;
      min-height: unset;
      overflow: hidden;
    }

    /* ── SHARED HEADER ───────────────────────────────────────────── */
    .app-header {
      background: linear-gradient(180deg, #2a1f08 0%, #1a1208 100%);
      border-bottom: 1px solid var(--gold-dim);
      padding: 12px 16px;
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; gap: 10px;
    }
    .app-header h1 {
      flex: 1;
      font-size: 1rem; font-weight: normal;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--gold);
    }
    .back-btn {
      background: none; border: 1px solid var(--border);
      color: var(--text-dim); border-radius: 6px;
      padding: 5px 10px; font-size: 0.8rem;
      cursor: pointer; font-family: inherit;
    }
    .back-btn:active { opacity: 0.7; }

    /* ── PILL / PIP BUTTONS ──────────────────────────────────────── */
    .pip-btn {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer; font-size: 0.6rem; font-weight: bold;
      display: inline-flex; align-items: center; justify-content: center;
      transition: transform 0.1s, border-color 0.15s;
      color: #000; user-select: none; flex-shrink: 0;
    }
    .pip-btn:active { transform: scale(0.88); }
    .pip-btn.active { border-color: #fff; box-shadow: 0 0 0 1px #fff4; }
    .pip-btn[data-c="W"] { background: var(--pip-W); }
    .pip-btn[data-c="U"] { background: var(--pip-U); color: #fff; }
    .pip-btn[data-c="B"] { background: var(--pip-B); color: #fff; }
    .pip-btn[data-c="R"] { background: var(--pip-R); color: #fff; }
    .pip-btn[data-c="G"] { background: var(--pip-G); color: #fff; }
    .pip-btn[data-c="C"] { background: var(--pip-C); }

    .pip {
      width: var(--pip-size); height: var(--pip-size);
      border-radius: 50%; border: 1.5px solid rgba(0,0,0,0.35);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 0.5rem; font-weight: bold; color: #000; flex-shrink: 0;
    }
    .pip.W { background: var(--pip-W); }
    .pip.U { background: var(--pip-U); color: #fff; }
    .pip.B { background: var(--pip-B); color: #fff; }
    .pip.R { background: var(--pip-R); color: #fff; }
    .pip.G { background: var(--pip-G); color: #fff; }
    .pip.C { background: var(--pip-C); }

    /* ─────────────────────────────────────────────────────────────
       START PAGE
    ───────────────────────────────────────────────────────────── */
    #page-start { justify-content: flex-start; }

    .start-hero {
      text-align: center;
      padding: 32px 20px 24px;
      background: linear-gradient(180deg, #2a1f08 0%, var(--bg) 100%);
      border-bottom: 1px solid var(--border);
    }
    .start-hero .rune { font-size: 2.8rem; line-height: 1; margin-bottom: 8px; }
    .start-hero h2 {
      font-size: 1.3rem; font-weight: normal;
      color: var(--gold); letter-spacing: 0.08em;
      text-transform: uppercase; margin-bottom: 4px;
    }
    .start-hero p { font-size: 0.8rem; color: var(--text-dim); }

    .start-filters {
      padding: 20px 16px;
      display: flex; flex-direction: column; gap: 16px;
      flex: 1;
    }

    .filter-group label {
      display: block; font-size: 0.65rem;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--gold-dim); margin-bottom: 7px;
    }
    .filter-group input,
    .filter-group select {
      width: 100%;
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-size: 0.88rem; padding: 10px 12px;
      outline: none; font-family: inherit;
      -webkit-appearance: none;
    }
    .filter-group input:focus,
    .filter-group select:focus { border-color: var(--gold-dim); }
    .filter-group input::placeholder { color: var(--text-dim); }

    .color-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .start-actions {
      padding: 0 16px calc(16px + var(--safe-bottom));
      display: flex; flex-direction: column; gap: 10px;
    }

    .start-loading-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .first-load-msg {
      text-align: center;
      max-width: 280px;
    }
    .first-load-title {
      font-size: 0.95rem;
      color: var(--text);
      margin-bottom: 8px;
    }
    .first-load-sub {
      font-size: 0.75rem;
      color: var(--gold-dim);
      font-family: monospace;
      margin-bottom: 16px;
      min-height: 1.2em;
    }
    .first-load-note {
      font-size: 0.7rem;
      color: var(--text-dim);
      line-height: 1.5;
      border-top: 1px solid var(--border);
      padding-top: 14px;
    }
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #a07830 0%, var(--gold) 50%, #a07830 100%);
      border: none; border-radius: var(--radius);
      color: #1a1208; font-size: 0.95rem; font-weight: bold;
      cursor: pointer; font-family: inherit;
      letter-spacing: 0.05em; text-transform: uppercase;
      transition: opacity 0.15s;
    }
    .btn-primary:disabled { opacity: 0.45; cursor: default; }
    .btn-primary:not(:disabled):active { opacity: 0.85; }

    .load-status {
      text-align: center; font-size: 0.75rem;
      color: var(--text-dim); display: flex;
      align-items: center; justify-content: center; gap: 7px;
    }
    .mini-spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--border); border-top-color: var(--gold);
      border-radius: 50%; animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─────────────────────────────────────────────────────────────
       BROWSE PAGE
    ───────────────────────────────────────────────────────────── */
    #page-browse { }
    .browse-toolbar {
      background: linear-gradient(180deg, #2a1f08 0%, #1a1208 100%);
      border-bottom: 1px solid var(--gold-dim);
      padding: 8px 12px;
      position: sticky; top: 0; z-index: 100;
      display: flex; flex-direction: column; gap: 6px;
    }
    .browse-toolbar-row {
      display: flex; align-items: center; gap: 6px;
    }
    #browse-search {
      flex: 1; background: #2a2010; border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-size: 0.82rem;
      padding: 7px 10px; outline: none; font-family: inherit;
    }
    #browse-search::placeholder { color: var(--text-dim); }
    #browse-search:focus { border-color: var(--gold-dim); }
    #sort-select {
      background: #2a2010; border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-size: 0.75rem;
      padding: 6px 7px; outline: none; cursor: pointer;
      -webkit-appearance: none; flex-shrink: 0;
    }
    .deck-count-badge {
      font-size: 0.68rem; color: var(--text-dim);
      font-family: monospace; background: #2a2010;
      padding: 3px 8px; border-radius: 10px;
      border: 1px solid var(--border); flex-shrink: 0;
    }

    /* grid */    .browse-main { padding: 10px; flex: 1; }
    .set-group { margin-bottom: 20px; }
    .set-header {
      display: flex; align-items: baseline; gap: 8px;
      margin-bottom: 8px; padding-bottom: 5px;
      border-bottom: 1px solid var(--border);
    }
    .set-name { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gold-dim); }
    .set-year { font-size: 0.65rem; color: var(--text-dim); font-family: monospace; }
    .set-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 7px; }

    /* deck card */
    .deck-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      display: flex; flex-direction: column;
      cursor: pointer; transition: border-color 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .deck-card:active { transform: scale(0.97); border-color: var(--gold-dim); }

    .card-art-wrap {
      width: 100%; aspect-ratio: 16/9; overflow: hidden;
      background: linear-gradient(135deg, #2a2010 0%, #1c1710 100%);
      position: relative;
    }
    .card-art-wrap img {
      width: 100%; height: 100%; object-fit: cover; object-position: top center;
      display: block; transition: opacity 0.3s;
    }
    .card-art-wrap img.loading { opacity: 0; }
    .art-placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--gold-dim); font-size: 1.4rem;
    }

    .card-body { padding: 7px 9px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .card-deck-name { font-size: 0.8rem; color: var(--gold); line-height: 1.2; }
    .card-cmd { font-size: 0.68rem; color: var(--text-dim); line-height: 1.3; }
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 9px 7px;
    }
    .color-pips { display: flex; gap: 3px; }
    .card-date { font-size: 0.6rem; color: var(--text-dim); font-family: monospace; }

    /* empty/error */
    .status-msg {
      text-align: center; padding: 50px 20px;
      color: var(--text-dim); font-size: 0.85rem;
    }
    .status-msg .icon { font-size: 2rem; margin-bottom: 10px; }

    /* ─────────────────────────────────────────────────────────────
       DETAIL PAGE
    ───────────────────────────────────────────────────────────── */

    /* Credit bar sits below hero on all screen sizes */
    .detail-credit-bar {
      font-size: 0.62rem;
      color: var(--text-dim);
      font-family: sans-serif;
      text-align: center;
      padding: 4px 12px;
      flex-shrink: 0;
      background: var(--bg);
      min-height: 18px;
    }

    /* Base rules — apply everywhere, overridden per breakpoint below */
    #page-detail { }
    .detail-hero {
      position: relative;
      width: 100%;
      flex-shrink: 0;
      background: #0e0b06;
      overflow: hidden;
    }
    /* Default (art crop): fill the area */
    .detail-hero img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: top center;
      display: block;
      transition: opacity 0.2s;
    }
    /* Full card mode: show entire card without cropping */
    .detail-hero.card-mode img {
      object-fit: contain;
      object-position: center;
    }
    .detail-hero img.loading { opacity: 0; }
    .detail-columns {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .detail-body {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px 20px;
    }
    .detail-preview-panel { /* inherits display:none from .card-preview-panel on mobile */ }

    /* Mobile: lock page, art crop hero, scrollable list below */
    @media (max-width: 899px) {
      #page-detail.active {
        height: 100dvh;
        min-height: unset;
        overflow: hidden;
      }
      .detail-hero {
        height: 40dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
      }
      .detail-credit-bar {
        flex-shrink: 0;
      }
      .detail-hero-overlay { display: none; }
      .detail-hero-hint {
        position: absolute;
        bottom: 6px; left: 0; right: 0;
        text-align: center;
        font-size: 0.6rem;
        color: rgba(255,255,255,0.35);
        font-family: sans-serif;
        pointer-events: none;
      }
    }

    /* Desktop: art crop banner + side preview panel */
    @media (min-width: 900px) {
      .detail-hero {
        aspect-ratio: 16/7;
        background: #1c1710;
      }
      .detail-hero-overlay {
        position: absolute; inset: 0;
        background: linear-gradient(to bottom, transparent 30%, var(--bg) 100%);
      }
      .detail-hero-hint { display: none; }
      .detail-preview-panel {
        height: auto;
        align-self: stretch;
      }
      .detail-body { max-width: none; margin: 0; }
    }

    .detail-title {
      font-size: 1.25rem; color: var(--gold);
      margin-bottom: 2px; line-height: 1.2;
    }
    .detail-set { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 10px; }
    .detail-colors { display: flex; gap: 5px; margin-bottom: 14px; }

    .detail-commanders { margin-bottom: 16px; }
    .detail-commanders h3 {
      font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--gold-dim); margin-bottom: 6px;
    }
    .commander-entry {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px; background: var(--card-bg);
      border: 1px solid var(--border); border-radius: 6px;
      margin-bottom: 5px;
    }
    .commander-label {
      font-size: 0.62rem; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.05em;
      width: 60px; flex-shrink: 0;
    }
    .commander-name { font-size: 0.88rem; color: var(--text); }

    /* card list */
    .detail-list h3 {
      font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--gold-dim); margin-bottom: 8px;
    }
    .type-group { margin-bottom: 14px; }
    .type-group-header {
      display: flex; align-items: baseline; gap: 7px;
      padding: 3px 0 4px; border-bottom: 1px solid var(--border);
      margin-bottom: 5px;
    }
    .type-group-name { font-size: 0.72rem; color: var(--text); }
    .type-group-count {
      font-size: 0.65rem; color: var(--text-dim);
      font-family: monospace;
    }
    .card-row {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 0; border-bottom: 1px solid #2a2010;
    }
    .card-row:last-child { border-bottom: none; }
    .card-row-count {
      font-size: 0.7rem; color: var(--gold-dim);
      font-family: monospace; width: 16px; text-align: right; flex-shrink: 0;
    }
    .card-row-name { font-size: 0.8rem; color: var(--text); }
    .card-row-foil { font-size: 0.6rem; color: var(--gold-dim); margin-left: auto; flex-shrink: 0; }
    .card-row.tapped { background: #2a2010; border-radius: 4px; }

    .detail-loading {
      text-align: center; padding: 24px;
      color: var(--text-dim); font-size: 0.8rem;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border); border-top-color: var(--gold);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }

    /* ── BROWSE BODY (two-column on desktop) ─────────────────────── */
    .browse-body {
      display: flex;
      flex: 1;
      overflow: hidden; /* children manage their own scroll */
    }
    .browse-main {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    /* ── CARD PREVIEW PANEL ──────────────────────────────────────── */
    /* Hidden on mobile — shown only when viewport is wide enough */
    .card-preview-panel {
      display: none;
    }

    @media (min-width: 900px) {
      .card-preview-panel {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 260px;
        flex-shrink: 0;
        height: 100%; /* fills the browse-body flex row */
        padding: 16px 12px;
        border-left: 1px solid var(--border);
        background: var(--surface);
      }

      .preview-empty {
        text-align: center;
        color: var(--text-dim);
        font-size: 0.78rem;
        line-height: 1.6;
        border: 1px dashed var(--border);
        border-radius: var(--radius);
        padding: 20px;
        width: 100%;
      }

      .preview-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        width: 100%;
      }

      #preview-img {
        width: 100%;
        max-width: 224px; /* standard card ratio ~63×88mm → 224×313px at this width */
        border-radius: 10px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.7);
        transition: opacity 0.2s;
        display: block;
      }
      #preview-img.loading { opacity: 0; }

      .preview-credit {
        font-size: 0.6rem;
        color: var(--text-dim);
        text-align: center;
        font-family: sans-serif;
      }
    }

    /* responsive */
    @media (min-width: 600px) {
      .set-cards { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
      .detail-body { max-width: 700px; margin: 0 auto; }
    }
    @media (max-width: 360px) {
      .set-cards { grid-template-columns: 1fr 1fr; }
      --pip-size: 16px;
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════════
     START PAGE
══════════════════════════════════════════════════════════════ -->
<div id="page-start" class="page active">
  <div class="start-hero">
    <div class="rune">⚔</div>
    <h2>Commander Precons</h2>
    <p>All official Commander preconstructed decks</p>
  </div>

  <!-- Shown only on first load (no cache) -->
  <div class="start-loading-state" id="start-loading-state">
    <div class="first-load-msg">
      <div class="mini-spinner" style="width:20px;height:20px;border-width:3px;margin:0 auto 14px"></div>
      <p class="first-load-title">Fetching decks for the first time…</p>
      <p class="first-load-sub" id="load-status-text">Loading decks…</p>
      <p class="first-load-note">This only happens once. Future visits load instantly from cache.</p>
    </div>
  </div>

  <!-- Shown when data is ready (or cached) -->
  <div class="start-filters" id="start-filters" style="display:none">

    <div class="filter-group">
      <label>Search</label>
      <input type="search" id="start-search" placeholder="Deck name, commander, set…" autocomplete="off" />
    </div>

    <div class="filter-group">
      <label>Color identity</label>
      <div class="color-row" id="start-color-row">
        <button class="pip-btn" data-c="W">W</button>
        <button class="pip-btn" data-c="U">U</button>
        <button class="pip-btn" data-c="B">B</button>
        <button class="pip-btn" data-c="R">R</button>
        <button class="pip-btn" data-c="G">G</button>
        <button class="pip-btn" data-c="C">C</button>
      </div>
    </div>

    <div class="filter-group">
      <label>Set</label>
      <select id="start-set">
        <option value="">All sets</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Sort</label>
      <select id="start-sort">
        <option value="date-desc">Newest first</option>
        <option value="date-asc">Oldest first</option>
        <option value="name">A – Z</option>
      </select>
    </div>

  </div>

  <div class="start-actions" id="start-actions" style="display:none">
    <div class="load-status" id="load-status">
      <span class="mini-spinner" style="display:none"></span>
      <span id="load-status-cached"></span>
    </div>
    <button class="btn-primary" id="browse-btn">Browse Decks</button>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════
     BROWSE PAGE
══════════════════════════════════════════════════════════════ -->
<div id="page-browse" class="page">
  <div class="browse-toolbar">
    <div class="browse-toolbar-row">
      <button class="back-btn" id="browse-back">← Filters</button>
      <input id="browse-search" type="search" placeholder="Search…" autocomplete="off" />
      <select id="sort-select">
        <option value="date-desc">New</option>
        <option value="date-asc">Old</option>
        <option value="name">A–Z</option>
      </select>
      <span class="deck-count-badge" id="deck-count">—</span>
    </div>
    <div class="browse-toolbar-row">
      <div id="browse-color-row" style="display:flex;gap:5px">
        <button class="pip-btn" data-c="W">W</button>
        <button class="pip-btn" data-c="U">U</button>
        <button class="pip-btn" data-c="B">B</button>
        <button class="pip-btn" data-c="R">R</button>
        <button class="pip-btn" data-c="G">G</button>
        <button class="pip-btn" data-c="C">C</button>
      </div>
    </div>
  </div>
  <div class="browse-body">
    <div class="browse-main" id="browse-main">
      <div class="status-msg"><div class="icon">⚔</div><p>Loading…</p></div>
    </div>
    <!-- Desktop card preview panel -->
    <div class="card-preview-panel" id="card-preview-panel">
      <div class="preview-empty" id="preview-empty">
        <span>Hover a deck<br>to preview</span>
      </div>
      <div class="preview-content" id="preview-content" style="display:none">
        <img id="preview-img" src="" alt="" />
        <div class="preview-credit" id="preview-credit"></div>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════
     DETAIL PAGE
══════════════════════════════════════════════════════════════ -->
<div id="page-detail" class="page">
  <div class="app-header">
    <button class="back-btn" id="detail-back">← Decks</button>
    <h1 id="detail-header-title">Deck</h1>
  </div>
  <div class="detail-hero" id="detail-hero">
    <div class="art-placeholder">⚔</div>
  </div>
  <div class="detail-credit-bar" id="detail-credit-bar"></div>
  <div class="detail-columns">
    <div class="detail-body" id="detail-body">
      <div class="detail-loading"><div class="spinner"></div><span>Loading deck list…</span></div>
    </div>
    <!-- Desktop card preview panel for decklist -->
    <div class="card-preview-panel detail-preview-panel" id="detail-preview-panel">
      <div class="preview-empty" id="detail-preview-empty">
        <span>Hover a card<br>to preview</span>
      </div>
      <div class="preview-content" id="detail-preview-content" style="display:none">
        <img id="detail-preview-img" src="" alt="" />
        <div class="preview-credit" id="detail-preview-credit"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
//  CONSTANTS
// ════════════════════════════════════════════════════════════════
const DECKS_URL = 'https://raw.githubusercontent.com/taw/magic-preconstructed-decks-data/master/decks_v2.json';
const SF_NAMED  = 'https://api.scryfall.com/cards/named?exact=';
const SF_COLL   = 'https://api.scryfall.com/cards/collection';
const DELAY     = 80; // ms between Scryfall calls

const TYPE_ORDER = ['Creature','Planeswalker','Instant','Sorcery','Artifact','Enchantment','Battle','Land','Other'];
const CACHE_KEY  = 'mtg_precons_v2';
const CACHE_TTL  = 24 * 60 * 60 * 1000; // 24 hours in ms
const COLOR_ORDER = ['W','U','B','R','G'];

// ════════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════════
let allDecks = [];        // [{name, setName, releaseDate, face, second, rawCards, colors, art, artist, copyright}]
let sfCache  = {};        // cardName -> {colors, art, artist, copyright}
let detailCardCache = {}; // deckName -> [{name, type_line, count, foil}...]

let activeColors = new Set();
let sortMode     = 'date-desc';
let searchTerm   = '';
let activeSet    = '';
let browseScrollY = 0;
let dataReady    = false;

// ════════════════════════════════════════════════════════════════
//  UTILITIES
// ════════════════════════════════════════════════════════════════
const sleep = ms => new Promise(r => setTimeout(r, ms));
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function colorName(c) { return {W:'White',U:'Blue',B:'Black',R:'Red',G:'Green',C:'Colorless'}[c]||c; }
function getYear(d) { return (d||'').slice(0,4); }

function classifyType(type_line) {
  if (!type_line) return 'Other';
  for (const t of TYPE_ORDER) {
    if (t === 'Other') continue;
    if (type_line.includes(t)) return t;
  }
  return 'Other';
}

// ════════════════════════════════════════════════════════════════
//  PAGE NAVIGATION
// ════════════════════════════════════════════════════════════════
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id !== 'page-browse') window.scrollTo(0,0);
}

// ════════════════════════════════════════════════════════════════
//  DATA LOADING
// ════════════════════════════════════════════════════════════════
function getCommanderNames(deck) {
  const cmds = deck.commander || [];
  const disp = deck.displayCommander || [];
  if (cmds.length >= 2) return { face: cmds[0].name, second: cmds[1].name };
  if (cmds.length === 1) {
    const dispOther = disp.map(c=>c.name).filter(n=>n!==cmds[0].name);
    return { face: cmds[0].name, second: dispOther.length===1 ? dispOther[0] : null };
  }
  return { face: null, second: null };
}

async function fetchScryfallCard(name) {
  if (sfCache[name] !== undefined) return sfCache[name];
  try {
    await sleep(DELAY);
    const res = await fetch(SF_NAMED + encodeURIComponent(name));
    if (!res.ok) { sfCache[name] = null; return null; }
    const card = await res.json();
    sfCache[name] = extractCardMeta(card);
    return sfCache[name];
  } catch { sfCache[name] = null; return null; }
}

function extractCardMeta(card) {
  const colors = card.color_identity || [];
  let art = null, cardImg = null, artist = null;
  if (card.card_faces && card.card_faces[0]?.image_uris) {
    art     = card.card_faces[0].image_uris.art_crop;
    cardImg = card.card_faces[0].image_uris.normal;
  } else if (card.image_uris) {
    art     = card.image_uris.art_crop;
    cardImg = card.image_uris.normal;
  }
  artist = card.artist || null;
  return { colors, art, cardImg, artist };
}

function setColors(deck) {
  const f = deck.face ? sfCache[deck.face] : null;
  const s = deck.second ? sfCache[deck.second] : null;
  const set = new Set();
  (f?.colors||[]).forEach(c=>set.add(c));
  (s?.colors||[]).forEach(c=>set.add(c));
  deck.colors  = set.size===0 ? ['C'] : COLOR_ORDER.filter(c=>set.has(c));
  deck.art     = f?.art     || null;
  deck.cardImg = f?.cardImg || null;
  deck.artist  = f?.artist  || null;
}

// ── Cache helpers ──────────────────────────────────────────────
function saveCache(decks) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), decks }));
  } catch(e) {
    // localStorage can be full or blocked — silently ignore
    console.warn('Cache write failed:', e.message);
  }
}

function loadCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const { ts, decks } = JSON.parse(raw);
    if (Date.now() - ts > CACHE_TTL) return null; // stale
    return { decks, ts };
  } catch {
    return null;
  }
}

function cacheAge(ts) {
  const mins = Math.round((Date.now() - ts) / 60000);
  if (mins < 2)  return 'just now';
  if (mins < 60) return `${mins}m ago`;
  return `${Math.round(mins/60)}h ago`;
}

// ── Main load ─────────────────────────────────────────────────
async function loadDecks() {
  // 1. Try cache first
  const cached = loadCache();
  if (cached) {
    allDecks = cached.decks;
    populateSetDropdown();
    dataReady = true;
    showStartReady(cached.ts);
    return;
  }

  // 2. No valid cache — fetch everything, show loading state
  setLoadStatus('Fetching deck list…', true);
  try {
    const res = await fetch(DECKS_URL);
    if (!res.ok) throw new Error('HTTP '+res.status);
    const raw = await res.json();

    const filtered = raw.filter(d =>
      d.type === 'Commander Deck' &&
      !d.name.includes('Collector') &&
      !(d.set_name||'').includes('MTGO')
    );

    filtered.sort((a,b) => (b.release_date||'').localeCompare(a.release_date||''));

    allDecks = filtered.map(d => {
      const {face, second} = getCommanderNames(d);
      return {
        name: d.name,
        setName: d.set_name || '',
        releaseDate: d.release_date || '',
        face, second,
        rawCards: [...(d.cards||[]), ...(d.commander||[])],
        colors: [], art: null, artist: null, cardImg: null,
      };
    });

    populateSetDropdown();
    setLoadStatus(`Fetching commander data (0/${allDecks.length})…`);

    const names = new Set();
    allDecks.forEach(d => { if(d.face) names.add(d.face); if(d.second) names.add(d.second); });

    let done = 0;
    for (const name of names) {
      await fetchScryfallCard(name);
      done++;
      allDecks.forEach(d => {
        if ((d.face===name||d.second===name) && d.colors.length===0) setColors(d);
      });
      setLoadStatus(`Fetching commander data (${done}/${names.size})…`);
    }

    saveCache(allDecks);
    dataReady = true;
    showStartReady(null); // no cache timestamp — freshly loaded

  } catch(e) {
    const $sub = document.getElementById('load-status-text');
    if ($sub) $sub.textContent = 'Failed to load: ' + e.message;
  }
}

function setLoadStatus(text, spinning, showRefresh = false) {
  // Update the first-load progress text (visible during fetch)
  const $sub = document.getElementById('load-status-text');
  if ($sub) $sub.textContent = text;
}

function showStartReady(cacheInfo) {
  // Hide loading state, reveal filters + browse button
  document.getElementById('start-loading-state').style.display = 'none';
  document.getElementById('start-filters').style.display = '';
  document.getElementById('start-actions').style.display = '';

  // Show cache age or nothing in the status area
  const $cached = document.getElementById('load-status-cached');
  if ($cached && cacheInfo) {
    $cached.textContent = `${allDecks.length} decks · cached ${cacheAge(cacheInfo)}`;
  } else if ($cached) {
    $cached.textContent = `${allDecks.length} decks loaded`;
  }

  // Show refresh link if using cache
  if (cacheInfo) {
    const $refresh = document.createElement('button');
    $refresh.textContent = 'Refresh';
    $refresh.style.cssText = 'background:none;border:none;color:var(--gold-dim);font-size:0.72rem;cursor:pointer;text-decoration:underline;padding:0 0 0 6px;font-family:inherit;';
    $refresh.addEventListener('click', () => {
      try { localStorage.removeItem(CACHE_KEY); } catch {}
      location.reload();
    });
    document.getElementById('load-status').appendChild($refresh);
  }
}

function populateSetDropdown() {
  const sets = [...new Set(allDecks.map(d=>d.setName))].filter(Boolean);
  // Sets already sorted newest-first from allDecks
  const sel = document.getElementById('start-set');
  sets.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    sel.appendChild(opt);
  });
}

// ════════════════════════════════════════════════════════════════
//  FILTERING & SORTING
// ════════════════════════════════════════════════════════════════
function getFiltered() {
  let decks = [...allDecks];
  if (searchTerm) {
    const q = searchTerm.toLowerCase();
    decks = decks.filter(d =>
      d.name.toLowerCase().includes(q) ||
      d.setName.toLowerCase().includes(q) ||
      (d.face&&d.face.toLowerCase().includes(q)) ||
      (d.second&&d.second.toLowerCase().includes(q))
    );
  }
  if (activeColors.size > 0) {
    decks = decks.filter(d => [...activeColors].every(c=>d.colors.includes(c)));
  }
  if (activeSet) {
    decks = decks.filter(d => d.setName === activeSet);
  }
  if (sortMode==='date-desc') decks.sort((a,b)=>b.releaseDate.localeCompare(a.releaseDate));
  else if (sortMode==='date-asc') decks.sort((a,b)=>a.releaseDate.localeCompare(b.releaseDate));
  else decks.sort((a,b)=>a.name.localeCompare(b.name));
  return decks;
}

// ════════════════════════════════════════════════════════════════
//  BROWSE RENDER
// ════════════════════════════════════════════════════════════════
function renderBrowse() {
  const decks = getFiltered();
  const $main = document.getElementById('browse-main');
  const $count = document.getElementById('deck-count');
  $count.textContent = decks.length;

  if (!decks.length) {
    $main.innerHTML = '<div class="status-msg"><div class="icon">🔍</div><p>No decks match.</p></div>';
    return;
  }

  if (sortMode === 'name') {
    $main.innerHTML = `<div class="set-cards">${decks.map(cardHtml).join('')}</div>`;
  } else {
    const groups = [], seen = new Map();
    decks.forEach(d => {
      if (!seen.has(d.setName)) { seen.set(d.setName,[]); groups.push(d.setName); }
      seen.get(d.setName).push(d);
    });
    $main.innerHTML = groups.map(sn => {
      const sd = seen.get(sn);
      return `<div class="set-group">
        <div class="set-header">
          <span class="set-name">${esc(sn)}</span>
          <span class="set-year">${getYear(sd[0].releaseDate)}</span>
        </div>
        <div class="set-cards">${sd.map(cardHtml).join('')}</div>
      </div>`;
    }).join('');
  }

  // Attach click + hover handlers
  $main.querySelectorAll('.deck-card').forEach(el => {
    el.addEventListener('click', () => openDetail(el.dataset.name));
    el.addEventListener('mouseenter', () => showCardPreview(el.dataset.name));
    el.addEventListener('mouseleave', () => hideCardPreview());
  });

  // Restore scroll position inside the grid container
  document.getElementById('browse-main').scrollTop = browseScrollY;
}

function cardHtml(d) {
  const pips = d.colors.map(c=>`<span class="pip ${c}" title="${colorName(c)}">${c}</span>`).join('');
  const artHtml = d.art
    ? `<img src="${esc(d.art)}" alt="${esc(d.face||d.name)}" loading="lazy" class="loading" onload="this.classList.remove('loading')" /><div class="art-placeholder">⚔</div>`
    : `<div class="art-placeholder">⚔</div>`;
  const cmdText = d.face
    ? (d.second ? `${esc(d.face)} &amp; ${esc(d.second)}` : esc(d.face))
    : '';

  return `<div class="deck-card" data-name="${esc(d.name)}">
    <div class="card-art-wrap">${artHtml}</div>
    <div class="card-body">
      <div class="card-deck-name">${esc(d.name)}</div>
      ${cmdText ? `<div class="card-cmd">${cmdText}</div>` : ''}
    </div>
    <div class="card-footer">
      <div class="color-pips">${pips}</div>
      <span class="card-date">${d.releaseDate.slice(0,7)}</span>
    </div>
  </div>`;
}

// ════════════════════════════════════════════════════════════════
//  DETAIL PAGE
// ════════════════════════════════════════════════════════════════
async function openDetail(deckName) {
  browseScrollY = document.getElementById('browse-main').scrollTop;
  const deck = allDecks.find(d => d.name === deckName);
  if (!deck) return;

  document.getElementById('detail-header-title').textContent = deck.name;

  // Default hero = art crop (atmospheric, fills space nicely)
  // Card tap = full card image (shows text box)
  const defaultImg = deck.art || deck.cardImg || null;
  const defaultMode = 'art'; // cover mode

  setDetailHeroImage(defaultImg, deck.face, deck.artist, 'art');

  // Tap hero to reset to art crop
  const $hero = document.getElementById('detail-hero');
  $hero.onclick = () => {
    setDetailHeroImage(defaultImg, deck.face, deck.artist, 'art');
    document.querySelectorAll('.card-row.tapped').forEach(r => r.classList.remove('tapped'));
  };

  const $body = document.getElementById('detail-body');
  $body.scrollTop = 0;
  $body.innerHTML = `
    <div style="margin-top:14px">
      <div class="detail-title">${esc(deck.name)}</div>
      <div class="detail-set">${esc(deck.setName)} · ${deck.releaseDate}</div>
      <div class="detail-colors">${deck.colors.map(c=>`<span class="pip ${c}" title="${colorName(c)}">${c}</span>`).join('')}</div>
      <div class="detail-commanders">
        <h3>Commanders</h3>
        ${deck.face ? `<div class="commander-entry"><span class="commander-label">Face</span><span class="commander-name">${esc(deck.face)}</span></div>` : ''}
        ${deck.second ? `<div class="commander-entry"><span class="commander-label">Partner</span><span class="commander-name">${esc(deck.second)}</span></div>` : ''}
      </div>
      <div class="detail-list">
        <h3>Decklist</h3>
        <div id="detail-list-inner">
          <div class="detail-loading"><div class="spinner"></div><span>Fetching cards…</span></div>
        </div>
      </div>
    </div>`;

  showPage('page-detail');

  const cards = await getDetailCards(deck);
  renderDetailList(cards, document.getElementById('detail-list-inner'));
}

// mode: 'art' = cover/crop (commander art), 'card' = contain (full card with text)
function setDetailHeroImage(imgUrl, altText, artist, mode) {
  const $hero   = document.getElementById('detail-hero');
  const $credit = document.getElementById('detail-credit-bar');

  // Toggle cover vs contain via class
  $hero.classList.toggle('card-mode', mode === 'card');

  if (!imgUrl) {
    let $ph = $hero.querySelector('.art-placeholder');
    if (!$ph) {
      $hero.innerHTML = '';
      $ph = document.createElement('div');
      $ph.className = 'art-placeholder';
      $ph.style.fontSize = '3rem';
      $ph.textContent = '⚔';
      $hero.appendChild($ph);
    }
    if ($credit) $credit.textContent = '';
    return;
  }

  // Reuse existing img element to avoid flicker
  let $img = $hero.querySelector('img');
  if (!$img) {
    // Clear placeholder, add img
    $hero.innerHTML = '';
    $img = document.createElement('img');
    $hero.appendChild($img);
    // Re-add overlay and hint
    const $ov = document.createElement('div');
    $ov.className = 'detail-hero-overlay';
    $hero.appendChild($ov);
  }

  if ($img.src !== imgUrl) {
    // Clear src first so the old image disappears instantly before the
    // object-fit mode switches — prevents the "shrinking" artifact
    $img.classList.add('loading');
    $img.src = '';
    // Let the class toggle take effect, then load the new image
    requestAnimationFrame(() => {
      $img.src = imgUrl;
      $img.alt = altText || '';
      $img.onload = () => $img.classList.remove('loading');
    });
  }

  // Credit bar below hero
  if ($credit) {
    if (mode === 'art' && artist) {
      $credit.textContent = `Art by ${artist} · © Wizards of the Coast`;
    } else {
      $credit.textContent = '© Wizards of the Coast';
    }
  }
}

async function getDetailCards(deck) {
  if (detailCardCache[deck.name]) return detailCardCache[deck.name];

  // Combine all cards (main + commander, deduplicated by name)
  const allNames = deck.rawCards;
  // Batch into groups of 75 for Scryfall collection endpoint
  const batches = [];
  for (let i = 0; i < allNames.length; i += 75) batches.push(allNames.slice(i, i+75));

  const typeMap = {};   // name -> type_line
  const imgMap  = {};   // name -> full card image URL

  for (const batch of batches) {
    try {
      await sleep(DELAY);
      const res = await fetch(SF_COLL, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ identifiers: batch.map(c => ({ name: c.name })) })
      });
      if (!res.ok) continue;
      const data = await res.json();
      (data.data||[]).forEach(card => {
        typeMap[card.name] = card.type_line || 'Other';
        // Full card image — prefer front face for DFCs
        if (card.card_faces && card.card_faces[0]?.image_uris) {
          imgMap[card.name] = card.card_faces[0].image_uris.normal;
        } else if (card.image_uris) {
          imgMap[card.name] = card.image_uris.normal;
        }
      });
    } catch { /* skip batch on error */ }
  }

  // Build result: merge rawCards with types + images
  const seen = new Set();
  const result = [];
  for (const c of allNames) {
    const key = c.name + '|' + c.foil;
    if (seen.has(key)) continue;
    seen.add(key);
    result.push({
      name: c.name,
      count: c.count || 1,
      foil: c.foil || false,
      typeLine: typeMap[c.name] || null,
      typeGroup: classifyType(typeMap[c.name] || ''),
      cardImg: imgMap[c.name] || null,
    });
  }

  detailCardCache[deck.name] = result;
  return result;
}

function renderDetailList(cards, $el) {
  // Group by type
  const groups = {};
  TYPE_ORDER.forEach(t => groups[t] = []);
  cards.forEach(c => (groups[c.typeGroup]||groups['Other']).push(c));

  const html = TYPE_ORDER
    .filter(t => groups[t].length > 0)
    .map(t => {
      const items = groups[t];
      const total = items.reduce((s,c)=>s+c.count,0);
      const rows = items.map(c =>
        `<div class="card-row" data-img="${esc(c.cardImg||'')}" data-name="${esc(c.name)}">
          <span class="card-row-count">${c.count}</span>
          <span class="card-row-name">${esc(c.name)}</span>
          ${c.foil ? '<span class="card-row-foil">✦</span>' : ''}
        </div>`
      ).join('');
      return `<div class="type-group">
        <div class="type-group-header">
          <span class="type-group-name">${t}</span>
          <span class="type-group-count">(${total})</span>
        </div>
        ${rows}
      </div>`;
    }).join('');

  $el.innerHTML = html || '<p style="color:var(--text-dim);font-size:0.8rem">Card data unavailable.</p>';

  // Wire hover (desktop) + tap (mobile) events
  $el.querySelectorAll('.card-row[data-img]').forEach(row => {
    const img  = row.dataset.img;
    const name = row.dataset.name;
    if (!img) return;

    // Desktop hover → side panel
    row.addEventListener('mouseenter', () => showDetailCardPreview(img, name));
    row.addEventListener('mouseleave', () => hideDetailCardPreview());

    // Mobile tap → swap hero to full card image
    row.addEventListener('click', () => {
      if (window.matchMedia('(max-width: 899px)').matches) {
        setDetailHeroImage(img, name, null, 'card');
        document.querySelectorAll('.card-row.tapped').forEach(r => r.classList.remove('tapped'));
        row.classList.add('tapped');
      }
    });
  });
}

// ════════════════════════════════════════════════════════════════
//  CARD PREVIEW (desktop hover)
// ════════════════════════════════════════════════════════════════
function showCardPreview(deckName) {
  const deck = allDecks.find(d => d.name === deckName);
  if (!deck || !deck.cardImg) return;

  const $empty   = document.getElementById('preview-empty');
  const $content = document.getElementById('preview-content');
  const $img     = document.getElementById('preview-img');
  const $credit  = document.getElementById('preview-credit');

  $empty.style.display = 'none';
  $content.style.display = 'flex';

  // Only swap image if it's a different card (avoids flicker on small mouse moves)
  if ($img.dataset.deck !== deckName) {
    $img.classList.add('loading');
    $img.src = deck.cardImg;
    $img.alt = deck.face || deck.name;
    $img.dataset.deck = deckName;
    $img.onload = () => $img.classList.remove('loading');
    $credit.textContent = deck.artist
      ? `Art by ${deck.artist} · © Wizards of the Coast`
      : '© Wizards of the Coast';
  }
}

function hideCardPreview() {
  // Small delay so hovering between adjacent cards doesn't flicker
  // We clear it immediately if a new card is entered
  hideCardPreview._timer = setTimeout(() => {
    const $empty   = document.getElementById('preview-empty');
    const $content = document.getElementById('preview-content');
    if ($empty && $content) {
      $empty.style.display = '';
      $content.style.display = 'none';
    }
  }, 120);
}

// Cancel the hide timer when entering a new card
document.addEventListener('mouseenter', e => {
  if (e.target.closest && e.target.closest('.deck-card')) {
    clearTimeout(hideCardPreview._timer);
  }
}, true);

// ── Detail page card preview ───────────────────────────────────
function showDetailCardPreview(imgUrl, cardName) {
  clearTimeout(hideDetailCardPreview._timer);
  const $empty   = document.getElementById('detail-preview-empty');
  const $content = document.getElementById('detail-preview-content');
  const $img     = document.getElementById('detail-preview-img');
  const $credit  = document.getElementById('detail-preview-credit');
  if (!$empty) return;

  $empty.style.display = 'none';
  $content.style.display = 'flex';

  if ($img.src !== imgUrl) {
    $img.classList.add('loading');
    $img.src = imgUrl;
    $img.alt = cardName;
    $img.onload = () => $img.classList.remove('loading');
    $credit.textContent = '© Wizards of the Coast';
  }
}

function hideDetailCardPreview() {
  hideDetailCardPreview._timer = setTimeout(() => {
    const $empty   = document.getElementById('detail-preview-empty');
    const $content = document.getElementById('detail-preview-content');
    if ($empty && $content) {
      $empty.style.display = '';
      $content.style.display = 'none';
    }
  }, 120);
}

document.addEventListener('mouseenter', e => {
  if (e.target.closest && e.target.closest('.card-row')) {
    clearTimeout(hideDetailCardPreview._timer);
  }
}, true);

// ════════════════════════════════════════════════════════════════
//  EVENT WIRING
// ════════════════════════════════════════════════════════════════
function syncFiltersFromStart() {
  searchTerm   = document.getElementById('start-search').value.trim();
  activeSet    = document.getElementById('start-set').value;
  sortMode     = document.getElementById('start-sort').value;

  // Sync browse toolbar to match
  document.getElementById('browse-search').value = searchTerm;
  document.getElementById('sort-select').value = sortMode;

  // Sync browse color pips
  document.querySelectorAll('#browse-color-row .pip-btn').forEach(btn => {
    btn.classList.toggle('active', activeColors.has(btn.dataset.c));
  });
}

document.getElementById('browse-btn').addEventListener('click', () => {
  browseScrollY = 0;
  syncFiltersFromStart();
  renderBrowse();
  showPage('page-browse');
});

document.getElementById('browse-back').addEventListener('click', () => {
  showPage('page-start');
});

document.getElementById('detail-back').addEventListener('click', () => {
  showPage('page-browse');
  document.getElementById('browse-main').scrollTop = browseScrollY;
});

// Start page color pips
document.getElementById('start-color-row').addEventListener('click', e => {
  const btn = e.target.closest('.pip-btn'); if (!btn) return;
  const c = btn.dataset.c;
  if (activeColors.has(c)) { activeColors.delete(c); btn.classList.remove('active'); }
  else { activeColors.add(c); btn.classList.add('active'); }
});

// Browse toolbar: live filter
document.getElementById('browse-search').addEventListener('input', e => {
  searchTerm = e.target.value.trim();
  browseScrollY = 0;
  renderBrowse();
});
document.getElementById('sort-select').addEventListener('change', e => {
  sortMode = e.target.value; browseScrollY = 0; renderBrowse();
});
document.getElementById('browse-color-row').addEventListener('click', e => {
  const btn = e.target.closest('.pip-btn'); if (!btn) return;
  const c = btn.dataset.c;
  if (activeColors.has(c)) { activeColors.delete(c); btn.classList.remove('active'); }
  else { activeColors.add(c); btn.classList.add('active'); }
  // Mirror back to start page pips
  document.querySelectorAll('#start-color-row .pip-btn').forEach(b => {
    b.classList.toggle('active', activeColors.has(b.dataset.c));
  });
  browseScrollY = 0; renderBrowse();
});

// ════════════════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════════════════
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
loadDecks();
</script>
